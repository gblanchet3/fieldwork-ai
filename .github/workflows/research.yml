name: Daily Business Research

on:
  schedule:
    # 4pm Mountain Time (UTC-6 winter / UTC-7 summer) — runs at 22:00 UTC
    - cron: "0 22 * * 1-5"
  workflow_dispatch:
    inputs:
      slug:
        description: "Research a specific company slug (leave blank for next 10 pending)"
        required: false
        default: ""
      count:
        description: "Number of companies to research (default: 10)"
        required: false
        default: "10"

permissions:
  contents: write

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run research script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.slug }}" ]; then
            npm run research -- --slug "${{ github.event.inputs.slug }}"
          else
            npm run research -- --count "${{ github.event.inputs.count || '10' }}"
          fi

      - name: Commit research results
        run: |
          git config user.name "Fieldwork AI Research Bot"
          git config user.email "actions@github.com"
          git add data/pending/ data/companies.json
          git diff --staged --quiet || git commit -m "Research run: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
